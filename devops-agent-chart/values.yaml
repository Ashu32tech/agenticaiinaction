namespace: micro-demo

image:
  repository: devops-agent
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: NodePort
  port: 8501
  targetPort: 8501
  nodePort: 30090   # optional but recommended

env:
  OPENAI_API_KEY: "change-me"

resources:
  limits:
    cpu: "1"
    memory: "1Gi"
  requests:
    cpu: "500m"
    memory: "512Mi"

rbac:
  create: true